services:
  - type: web
    name: zotero-auto-script
    runtime: docker
    plan: free
    autoDeploy: false
    healthCheckPath: /
    envVars:
      # 不在 Blueprint 里管理访问密码：若写 generateValue，每次同步可能重新生成，删控制台变量也会“长回来”。
      # 需要密码时在 Render 控制台手动添加 APP_ACCESS_PASSWORD；不需要则不要设置该变量。
      - key: ZOTERO_LIBRARY_ID
        sync: false
      - key: ZOTERO_LIBRARY_TYPE
        value: user
      - key: ZOTERO_API_KEY
        sync: false
      - key: CROSSREF_MAILTO
        sync: false
      - key: REQUEST_DELAY_SECONDS
        value: "0.3"
      - key: CROSSREF_SCORE_THRESHOLD
        value: "30"
      - key: SEMANTIC_SCHOLAR_API_KEY
        sync: false
      - key: SEMANTIC_SCHOLAR_TOP_K
        value: "10"
